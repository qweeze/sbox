version: 2

project_name: sbox

before:
  hooks:
    - go test ./...

builds:
  - id: sbox
    main: ./cmd/sbox
    binary: sbox
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: bundles
    ids:
      - sbox
    formats:
      - tar.gz
    name_template: '{{ .ProjectName }}_{{ title .Os }}_{{ indexOrDefault (map "amd64" "x86_64" "arm64" "arm64") .Arch .Arch }}'
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  use: git
